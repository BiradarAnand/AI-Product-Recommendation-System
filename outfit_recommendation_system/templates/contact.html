{% extends "base.html" %}

{% block title %}Contact - Smart Outfit Recommendation{% endblock %}

{% block content %}
<main class="dashboard-single" style="display: flex; justify-content: center;">
    <section class="form-section glass-panel" style="width: 100%; max-width: 600px; text-align: center;">
        <div class="auth-icon" style="font-size: 3rem; margin-bottom: 1rem;">📞</div>
        <h2>Get in Touch</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Have any questions or suggestions regarding the AI
            recommendation model? Send us a message.</p>

        <form action="/" method="GET" style="text-align: left;">
            <div class="form-group">
                <label for="name">Contact Name</label>
                <input type="text" name="name" id="name" required class="form-input" placeholder="Your full name">
            </div>

            <div class="form-group">
                <label for="email">Contact Email</label>
                <input type="email" name="email" id="email" required class="form-input"
                    placeholder="Your email address">
            </div>

            <div class="form-group">
                <label for="message">Your Message</label>
                <textarea name="message" id="message" rows="4" required class="form-input"
                    placeholder="Write your message here..."
                    style="font-family: inherit; resize: vertical; min-height: 100px;"></textarea>
            </div>

            <button type="submit" class="cta-button" style="background-color: #a88e6a; margin-top: 1rem;">Submit
                Message</button>
        </form>
    </section>
</main>
{% endblock %}
